<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Alice Peirce</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="robots" content="noindex, nofollow, noarchive">

    <meta name="description" content="Alice Peirce Photo Gallery">

    <meta property="og:image" content="images/aliceface.jpg">

    <link rel="icon" href="images/aliceface.jpg">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="app">
<div id="overlay"></div>

    <!-- Header -->

    <header>

        <h1>Alice Peirce</h1>

    </header>

    <!-- Album -->

    <div id="albumBar">

    <button id="albumsButton">

        📁 Albums

    </button>

</div>

<div id="albumMenu">

    <!-- JavaScript builds this -->

</div>

    <!-- Viewer -->

    <main id="viewer">

        <button id="previousButton"
                class="navButton">
            &#10094;
        </button>

        <div id="photoContainer">

            <img id="photo"
                 src=""
                 alt="Alice">

            <div id="caption">

                <h2 id="albumTitle">
                    Prior to March 2026
                </h2>

                <p id="photoCounter">
                    1 of 1
                </p>

            </div>

        </div>

        <button id="nextButton"
                class="navButton">
            &#10095;
        </button>

    </main>

    <!-- Thumbnail Filmstrip -->

    <section id="filmstrip">

        <!-- JavaScript inserts thumbnails here -->

    </section>

    <!-- Bottom Controls -->

    <footer>

        <button id="playButton">

            ▶ Play Slideshow

        </button>

        <button id="fullscreenButton">

            ⛶ Fullscreen

        </button>

    </footer>

</div>

<script src="js/photos.js"></script>

<script src="js/gallery.js"></script>

</body>

</html>
